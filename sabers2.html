<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saber Destiny - Shared Forge</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }

        /* --- UI Containers --- */
        #header-container {
            position: absolute; top: 20px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; z-index: 200;
        }
        #header {
            text-transform: uppercase; letter-spacing: 8px; color: #0f0;
            font-size: 18px; font-weight: bold; margin-bottom: 12px; transition: opacity 0.3s;
        }
        #top-utils { display: flex; gap: 6px; pointer-events: auto; }
        #restore-ui {
            position: absolute; top: 15px; right: 15px; width: 40px; height: 40px;
            background: rgba(0, 255, 0, 0.15); border: 1px solid #0f0; color: #0f0;
            border-radius: 50%; display: none; align-items: center; justify-content: center;
            cursor: pointer; z-index: 999; font-weight: bold; backdrop-filter: blur(5px);
        }

        .util-btn {
            background: rgba(0,0,0,0.8); border: 1px solid #444; color: #fff;
            padding: 7px 12px; font-size: 10px; cursor: pointer; text-transform: uppercase; border-radius: 4px;
        }
        .util-btn.active { border-color: #0f0; color: #0f0; box-shadow: 0 0 8px rgba(0,255,0,0.4); }

        /* --- Floating Side Navigation --- */
        #gui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: center;
        }
        .part-row { display: flex; justify-content: space-between; align-items: center; height: 14vh; padding: 0 5%; }
        .nav-group { display: flex; align-items: center; pointer-events: auto; }
        .arrow {
            background: none; border: none; color: white; 
            font-size: clamp(45px, 10vw, 85px); cursor: pointer; opacity: 0.6;
            font-family: serif; transition: 0.2s;
        }
        .arrow:hover { color: #0f0; opacity: 1; }
        .part-name {
            font-size: clamp(14px, 4.5vw, 22px); font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; text-align: right; min-width: 110px; margin-right: 12px;
            text-shadow: 0 0 12px #000; transition: opacity 0.3s;
        }

        /* --- Bottom Color Bar --- */
        #color-bar {
            position: absolute; bottom: 35px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: clamp(15px, 6vw, 45px); 
            pointer-events: auto; z-index: 100;
        }
        .color-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .swatch { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #fff; position: relative; cursor: pointer; background: #fff; }
        .swatch input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .hex-val { font-family: monospace; font-size: 10px; color: #0f0; font-weight: bold; }

        .ui-hidden { opacity: 0 !important; pointer-events: none !important; }
        .label-hidden { opacity: 0 !important; }
    </style>
</head>
<body>

    <div id="restore-ui" onclick="toggleHUD()">X</div>

    <div id="header-container">
        <div id="header" class="hud-item">SABER DESTINY</div>
        <div id="top-utils" class="hud-item">
            <button id="rotBtn" class="util-btn active" onclick="toggleRotation()">Rotate</button>
            <button id="labelBtn" class="util-btn active" onclick="toggleLabels()">Labels</button>
            <button id="hudBtn" class="util-btn active" onclick="toggleHUD()">HUD</button>
            <button id="shareBtn" class="util-btn" onclick="shareSaber()">Share</button>
            <button class="util-btn" onclick="resetView()">Reset</button>
        </div>
    </div>

    <div id="gui" class="hud-item">
        <div class="part-row">
            <button class="arrow" onclick="cyclePart('emitter', -1)">&#12296;</button>
            <div class="nav-group"><span class="part-name label-text" id="emitter-label">Emitter</span><button class="arrow" onclick="cyclePart('emitter', 1)">&#12297;</button></div>
        </div>
        <div class="part-row">
            <button class="arrow" onclick="cyclePart('switch', -1)">&#12296;</button>
            <div class="nav-group"><span class="part-name label-text" id="switch-label">Switch</span><button class="arrow" onclick="cyclePart('switch', 1)">&#12297;</button></div>
        </div>
        <div class="part-row">
            <button class="arrow" onclick="cyclePart('sleeve', -1)">&#12296;</button>
            <div class="nav-group"><span class="part-name label-text" id="sleeve-label">Sleeve</span><button class="arrow" onclick="cyclePart('sleeve', 1)">&#12297;</button></div>
        </div>
        <div class="part-row">
            <button class="arrow" onclick="cyclePart('pommel', -1)">&#12296;</button>
            <div class="nav-group"><span class="part-name label-text" id="pommel-label">Pommel</span><button class="arrow" onclick="cyclePart('pommel', 1)">&#12297;</button></div>
        </div>
    </div>

    <div id="color-bar" class="hud-item">
        <div class="color-item"><div class="swatch" id="sw-emitter"><input type="color" id="input-emitter" oninput="applyColor('emitter', this.value)"></div><span class="hex-val" id="hex-emitter">#FFFFFF</span></div>
        <div class="color-item"><div class="swatch" id="sw-switch"><input type="color" id="input-switch" oninput="applyColor('switch', this.value)"></div><span class="hex-val" id="hex-switch">#FFFFFF</span></div>
        <div class="color-item"><div class="swatch" id="sw-sleeve"><input type="color" id="input-sleeve" oninput="applyColor('sleeve', this.value)"></div><span class="hex-val" id="hex-sleeve">#FFFFFF</span></div>
        <div class="color-item"><div class="swatch" id="sw-pommel"><input type="color" id="input-pommel" oninput="applyColor('pommel', this.value)"></div><span class="hex-val" id="hex-pommel">#FFFFFF</span></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const PART_DATA = {
            emitter: [{ name: "CRE Emitter", path: 'CereXRGBXeno/GLB/CRE_Emitter.glb' }, { name: "DR Emitter", path: 'DutyandResolveXRGBXeno/GLB/DR_Emitter.glb' }],
            switch: [{ name: "CRE Switch", path: 'CereXRGBXeno/GLB/CRE_Switch.glb' }, { name: "DR Switch I", path: 'DutyandResolveXRGBXeno/GLB/DR_Switch_I.glb' }, { name: "PC Switch I", path: 'PC/GLB/PC_Switch_I.glb' }],
            sleeve: [{ name: "CRE Wrapped", path: 'CereXRGBXeno/GLB/CRE_Sleeve_Wrapped.glb' }, { name: "DR Sleeve I", path: 'DutyandResolveXRGBXeno/GLB/DR_Sleeve_I.glb' }],
            pommel: [{ name: "CRE Pommel", path: 'CereXRGBXeno/GLB/CRE_Pommel.glb' }, { name: "DR Pommel", path: 'DutyandResolveXRGBXeno/GLB/DR_Pommel.glb' }]
        };

        const activeIndices = { emitter: 0, switch: 0, sleeve: 0, pommel: 0 };
        const activeParts = { emitter: null, switch: null, sleeve: null, pommel: null };
        const sectionColors = { emitter: '#ffffff', switch: '#ffffff', sleeve: '#ffffff', pommel: '#ffffff' };
        const GAP = 8.0;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new THREE.Scene()).texture;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight.position.set(50, 100, 100);
        scene.add(dirLight);

        const loader = new GLTFLoader();

        window.shareSaber = function() {
            const url = new URL(window.location.origin + window.location.pathname);
            const currentParams = new URLSearchParams(window.location.search);
            if(currentParams.has('type')) url.searchParams.set('type', currentParams.get('type'));

            ['emitter', 'switch', 'sleeve', 'pommel'].forEach(p => {
                url.searchParams.set(`c_${p.slice(0,2)}`, sectionColors[p].replace('#', ''));
                url.searchParams.set(`p_${p.slice(0,2)}`, activeIndices[p]);
            });

            navigator.clipboard.writeText(url.toString()).then(() => {
                const btn = document.getElementById('shareBtn');
                const old = btn.innerText; btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = old, 2000);
            });
        };

        window.applyColor = function(type, hex) {
            if (!hex.startsWith('#')) hex = '#' + hex;
            sectionColors[type] = hex;
            document.getElementById(`hex-${type}`).innerText = hex.toUpperCase();
            document.getElementById(`sw-${type}`).style.backgroundColor = hex;
            document.getElementById(`input-${type}`).value = hex;

            if (activeParts[type]) {
                activeParts[type].traverse(child => {
                    if (child.isMesh && !child.material.map) {
                        child.material.color.set(hex);
                        child.material.metalness = 0.5;
                        child.material.roughness = 0.7;
                    }
                });
            }
        };

        window.cyclePart = (cat, dir) => {
            activeIndices[cat] = (activeIndices[cat] + dir + PART_DATA[cat].length) % PART_DATA[cat].length;
            loadPart(cat);
        };

        function loadPart(cat) {
            const data = PART_DATA[cat][activeIndices[cat]];
            document.getElementById(`${cat}-label`).innerText = data.name;
            loader.load(data.path, (gltf) => {
                if (activeParts[cat]) scene.remove(activeParts[cat]);
                activeParts[cat] = gltf.scene;
                activeParts[cat].traverse(c => {
                    if (c.isMesh) {
                        if (!c.material.map) c.material.color.set(sectionColors[cat]);
                        c.material.metalness = 0.5;
                        c.material.roughness = 0.7;
                    }
                });
                scene.add(activeParts[cat]);
                updateAllPositions();
            });
        }

        function centerPart(part) {
            part.position.set(0,0,0);
            part.updateMatrixWorld();
            const box = new THREE.Box3().setFromObject(part);
            part.position.x = -((box.max.x + box.min.x) / 2);
            part.position.z = -((box.max.z + box.min.z) / 2);
        }

        function updateAllPositions() {
            if (activeParts.switch) {
                centerPart(activeParts.switch);
                activeParts.switch.position.y = -new THREE.Box3().setFromObject(activeParts.switch).min.y;
            }
            if (activeParts.sleeve) {
                centerPart(activeParts.sleeve);
                activeParts.sleeve.position.y = -GAP - new THREE.Box3().setFromObject(activeParts.sleeve).max.y;
            }
            if (activeParts.emitter) {
                centerPart(activeParts.emitter);
                let swTop = activeParts.switch ? new THREE.Box3().setFromObject(activeParts.switch).max.y : 40;
                activeParts.emitter.position.y = (swTop + GAP) - new THREE.Box3().setFromObject(activeParts.emitter).min.y;
            }
            if (activeParts.pommel) {
                centerPart(activeParts.pommel);
                let slBot = activeParts.sleeve ? new THREE.Box3().setFromObject(activeParts.sleeve).min.y : -60;
                activeParts.pommel.position.y = (slBot - GAP) - new THREE.Box3().setFromObject(activeParts.pommel).max.y;
            }
        }

        window.toggleLabels = () => {
            const labels = document.querySelectorAll('.label-text');
            const isVisible = !labels[0].classList.contains('label-hidden');
            labels.forEach(l => isVisible ? l.classList.add('label-hidden') : l.classList.remove('label-hidden'));
            document.getElementById('labelBtn').classList.toggle('active', !isVisible);
        };

        window.toggleHUD = () => {
            const hudItems = document.querySelectorAll('.hud-item');
            const isVisible = !hudItems[0].classList.contains('ui-hidden');
            hudItems.forEach(item => isVisible ? item.classList.add('ui-hidden') : item.classList.remove('ui-hidden'));
            document.getElementById('restore-ui').style.display = isVisible ? 'flex' : 'none';
            document.getElementById('hudBtn').classList.toggle('active', !isVisible);
        };

        let rotationActive = true;
        window.toggleRotation = () => {
            rotationActive = !rotationActive;
            document.getElementById('rotBtn').classList.toggle('active', rotationActive);
        };

        window.resetView = () => {
            camera.position.set(0, 0, 270);
            controls.target.set(0, 0, 0);
            controls.maxDistance = 300;
            controls.minDistance = 200;
        };

        function initializeForge() {
            const urlParams = new URLSearchParams(window.location.search);
            const pathTheme = urlParams.get('type');
            
            const themes = {
                'jedi': { title: 'Jedi Forge', color: '#3498db', bg: '#000b1a', def: '#3498db' },
                'sith': { title: 'Sith Armory', color: '#e74c3c', bg: '#1a0000', def: '#e74c3c' },
                'gray': { title: 'Balanced Forge', color: '#f1c40f', bg: '#121212', def: '#f1c40f' }
            };

            let baseColor = '#ffffff';
            if (pathTheme && themes[pathTheme]) {
                const t = themes[pathTheme];
                document.getElementById('header').innerText = t.title;
                document.getElementById('header').style.color = t.color;
                scene.background = new THREE.Color(t.bg);
                baseColor = t.def;
            }

            ['emitter', 'switch', 'sleeve', 'pommel'].forEach(p => {
                activeIndices[p] = parseInt(urlParams.get(`p_${p.slice(0,2)}`)) || 0;
                const paramCol = urlParams.get(`c_${p.slice(0,2)}`);
                window.applyColor(p, paramCol ? '#' + paramCol : baseColor);
                loadPart(p);
            });
        }

        initializeForge();
        window.resetView();
        animate();

        function animate() {
            requestAnimationFrame(animate);
            if (rotationActive) {
                Object.values(activeParts).forEach(p => { if(p) p.rotation.y += 0.01; });
            }
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateAllPositions();
        });
    </script>
</body>
</html>
