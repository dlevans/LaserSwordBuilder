<!DOCTYPE html>
<html>
<head>
    <title>Sith or Jedi Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 650px; margin: 40px auto; padding: 20px; line-height: 1.6; background-color: #121212; color: #e0e0e0; }
        .quiz-card { background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        /* Live Debug Counter */
        .debug-counter { 
            position: sticky; top: 10px; background: #2c3e50; color: white; 
            padding: 15px; border-radius: 8px; margin-bottom: 20px; 
            display: flex; justify-content: space-around; font-weight: bold; border: 1px solid #444;
            z-index: 10;
        }
        .debug-item span { color: #f1c40f; font-size: 1.2em; }

        .question { margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .hidden { display: none !important; }
        
        label { cursor: pointer; display: block; margin: 10px 0; padding: 10px; border-radius: 6px; background: #2a2a2a; transition: 0.2s; }
        label:hover { background-color: #3a3a3a; }
        
        button#submit-btn { background-color: #3498db; color: white; border: none; padding: 15px 24px; cursor: pointer; border-radius: 6px; font-size: 18px; width: 100%; font-weight: bold; text-transform: uppercase; }
        button#submit-btn:hover { background-color: #2980b9; }

        /* Results Styles */
        #result-container { text-align: center; }
        #result-image { width: 100%; border-radius: 8px; border: 2px solid #444; margin: 20px 0; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #result-title { font-size: 2.5em; margin-bottom: 10px; font-weight: 900; }
        
        /* Multi-UI Button Group */
        .button-group { display: flex; gap: 15px; justify-content: center; margin-top: 25px; flex-wrap: wrap; }
        .saber-choice-btn { 
            flex: 1; min-width: 200px; padding: 15px 20px; color: white; 
            text-decoration: none; border-radius: 8px; font-weight: bold; 
            font-size: 1.1em; transition: 0.3s; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .saber-choice-btn span { font-size: 0.7em; opacity: 0.8; text-transform: uppercase; margin-bottom: 4px; }
        .saber-choice-btn:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="quiz-card">
        <div class="debug-counter" id="debug-bar">
            <div class="debug-item">Jedi: <span id="jedi-count">0</span></div>
            <div class="debug-item">Gray: <span id="gray-count">0</span></div>
            <div class="debug-item">Sith: <span id="sith-count">0</span></div>
        </div>

        <div id="quiz-ui">
            <h1>Force Alignment Test</h1>
            <div id="quiz-container"></div>
            <button id="submit-btn">Reveal My Path</button>
        </div>

        <div id="result-container" class="hidden">
            <h2 id="result-title"></h2>
            <img id="result-image" src="" alt="Your Path">
            <p id="result-text" style="font-size: 1.2em; margin-bottom: 30px;"></p>
            
            <div class="button-group">
                <a id="link-classic" class="saber-choice-btn" href="#">
                    <span>Classic UI</span>
                    <div class="btn-text">Build Lightsaber</div>
                </a>
                <a id="link-updated" class="saber-choice-btn" href="#">
                    <span>Updated UI</span>
                    <div class="btn-text">Build Lightsaber</div>
                </a>
            </div>

            <p><button onclick="location.reload()" style="background:none; border:1px solid #555; margin-top:40px; font-size:14px; width:auto; color:#888; padding: 8px 15px; cursor:pointer;">Restart Quiz</button></p>
        </div>
    </div>

    <script>
        const quizData = [
            {
                q: "Someone has done you wrong. Do you seek revenge?",
                options: [
                    { text: "Karma comes for us all eventually.", weight: 2 },
                    { text: "No, I choose forgiveness.", weight: 1 },
                    { text: "Yes, they must feel my wrath.", weight: 3 }
                ]
            },
            {
                q: "Your friend stole the answer key to a test. What do you do?",
                options: [
                    { text: "Report them to the instructor.", weight: 1 },
                    { text: "Use the answer key for my own benefit.", weight: 3 },
                    { text: "Don't say anything, but don't cheat either.", weight: 2 }                    
                ]
            },
            {
                q: "What do you want most out of life?",
                options: [
                    { text: "The freedom to live by my own rules.", weight: 2 },
                    { text: "To bring peace and order to the galaxy.", weight: 1 },                    
                    { text: "To be powerful enough to never be controlled.", weight: 3 }
                ]
            },
            {
                q: "A conflict breaks out near you. Your first instinct is to:",
                options: [
                    { text: "Strike first to end it on my terms.", weight: 3 },
                    { text: "De-escalate and protect the innocent.", weight: 1 },
                    { text: "Wait and see which side is right.", weight: 2 }                  
                ]
            },
            {
                q: "How do you feel about this: 'I put myself before anyone or anything else.'",
                options: [
                    { text: "I completely disagree; I live for others.", weight: 1 },
                    { text: "I agree to an extent; self-preservation matters.", weight: 2 },
                    { text: "I completely agree; only the strong survive.", weight: 3 }
                ]
            }
        ];

        const container = document.getElementById('quiz-container');

        // Render Questions
        quizData.forEach((item, index) => {
            let html = `<div class="question">
                <p><strong>${index + 1}. ${item.q}</strong></p>`;
            item.options.forEach((opt) => {
                html += `<label>
                    <input type="radio" name="q${index}" value="${opt.weight}" class="quiz-radio"> ${opt.text}
                </label>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        // Live Counter logic
        document.addEventListener('change', (e) => {
            if (e.target.classList.contains('quiz-radio')) {
                let j = 0, g = 0, s = 0;
                document.querySelectorAll('input[type="radio"]:checked').forEach(radio => {
                    if (radio.value == "1") j++;
                    if (radio.value == "2") g++;
                    if (radio.value == "3") s++;
                });
                document.getElementById('jedi-count').innerText = j;
                document.getElementById('gray-count').innerText = g;
                document.getElementById('sith-count').innerText = s;
            }
        });

        // Submit logic
        document.getElementById('submit-btn').addEventListener('click', () => {
            const selections = document.querySelectorAll('input[type="radio"]:checked');
            if (selections.length < quizData.length) {
                alert("The Council requires all answers before a verdict!");
                return;
            }

            let totalPoints = 0;
            selections.forEach(choice => totalPoints += parseInt(choice.value));
            const average = totalPoints / quizData.length;

            const results = {
                jedi: {
                    title: "JEDI KNIGHT",
                    desc: "You are a beacon of light. Your path is one of peace and service.",
                    btn: "Complete Training",
                    color: "#3498db",
                    img: "images/good/good.png",
                    type: "jedi"
                },
                gray: {
                    title: "GRAY JEDI",
                    desc: "You walk the thin line of balance, fulfilling your own destiny.",
                    btn: "Seek Balance",
                    color: "#f1c40f",
                    img: "images/neutral/neutral.png",
                    type: "gray"
                },
                sith: {
                    title: "SITH LORD",
                    desc: "Your passion has freed you. Embrace the power of the dark side.",
                    btn: "Claim Power",
                    color: "#e74c3c",
                    img: "images/evil/evil.png",
                    type: "sith"
                }
            };

            let fate = average <= 1.4 ? results.jedi : (average <= 2.4 ? results.gray : results.sith);

            // Hide Quiz & Debug
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('debug-bar').classList.add('hidden');
            
            // Show Results
            const resultBox = document.getElementById('result-container');
            resultBox.classList.remove('hidden');
            
            document.getElementById('result-title').innerText = fate.title;
            document.getElementById('result-title').style.color = fate.color;
            document.getElementById('result-image').src = fate.img;
            document.getElementById('result-text').innerText = fate.desc;
            
            // Configure Classic UI Button
            const classicBtn = document.getElementById('link-classic');
            classicBtn.href = `sabers.html?type=${fate.type}`;
            classicBtn.style.backgroundColor = "#444"; // Slate grey for neutral choice
            classicBtn.querySelector('.btn-text').innerText = fate.btn;

            // Configure Updated UI Button
            const updatedBtn = document.getElementById('link-updated');
            updatedBtn.href = `sabers2.html?type=${fate.type}`;
            updatedBtn.style.backgroundColor = fate.color; // Thematic color for primary choice
            updatedBtn.querySelector('.btn-text').innerText = fate.btn;
        });
    </script>
</body>
</html>
